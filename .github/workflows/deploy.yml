name: Deploy to GitHub Pages

# Builds the Next.js static export and publishes it to GitHub Pages on every
# push to main. Enable once in: Settings → Pages → Source → "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          # Must match the repo name so assets resolve under /<repo>/
          NEXT_PUBLIC_BASE_PATH: /formuu

      # The game at public/game/ is copied verbatim (Next's env inlining never
      # touches it), so inject the Supabase config into its env.js here. When
      # the secrets are unset the stub stays and the game runs in local mode.
      # (The check lives in the shell: the `secrets` context is not allowed
      # in a step-level `if`, and using it there breaks workflow parsing.)
      - name: Enable game online rooms
        run: |
          if [ -n "$SB_URL" ]; then
            printf "export const SUPABASE_URL = '%s';\nexport const SUPABASE_ANON_KEY = '%s';\n" \
              "$SB_URL" "$SB_KEY" > out/game/env.js
          fi
        env:
          SB_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SB_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
