<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cosmic Jar — merge planets, build a Sun</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪐</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #070a18; touch-action: none; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; color: #eaf0ff; user-select: none; -webkit-user-select: none; }
  #c { position: fixed; inset: 0; display: block; }

  .hud { position: fixed; z-index: 10; pointer-events: none; }

  #scoreBox { top: 16px; left: 18px; }
  #scoreBox .label { font-size: 11px; letter-spacing: 3px; opacity: .55; }
  #score { font-size: 42px; font-weight: 800; line-height: 1.05; text-shadow: 0 2px 14px rgba(120,160,255,.45); }
  #best { font-size: 13px; opacity: .65; margin-top: 2px; }

  #nextBox { top: 16px; right: 18px; text-align: center; }
  #nextBox .label { font-size: 11px; letter-spacing: 3px; opacity: .55; margin-bottom: 6px; }
  #nextBall { width: 52px; height: 52px; border-radius: 50%; margin: 0 auto;
    box-shadow: inset -8px -10px 16px rgba(0,0,20,.45), 0 0 18px rgba(140,170,255,.25); }
  #nextName { font-size: 11px; opacity: .8; margin-top: 5px; letter-spacing: 1px; }

  #chain { right: 18px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 7px; align-items: center; }
  #chain .dot { border-radius: 50%; opacity: .35; box-shadow: inset -2px -3px 5px rgba(0,0,20,.5); transition: opacity .4s, transform .3s; }
  #chain .dot.seen { opacity: 1; }
  #chain .dot.flash { transform: scale(1.35); }
  @media (max-width: 700px) { #chain { display: none; } }

  #hint { bottom: 14px; left: 50%; transform: translateX(-50%); font-size: 12px; letter-spacing: 1px; opacity: .45; text-align: center; white-space: nowrap; }

  #soundBtn { position: fixed; bottom: 12px; right: 14px; z-index: 20; background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.15); color: #eaf0ff; border-radius: 10px; padding: 7px 11px;
    font-size: 16px; cursor: pointer; }

  .overlay { position: fixed; inset: 0; z-index: 30; display: flex; flex-direction: column; align-items: center;
    justify-content: center; background: rgba(5,7,20,.78); backdrop-filter: blur(6px); text-align: center; padding: 20px; }
  .overlay.hidden { display: none; }
  .overlay h1 { font-size: clamp(34px, 7vw, 60px); font-weight: 900; letter-spacing: 2px;
    background: linear-gradient(120deg, #ffd76a, #ff9a5a 35%, #b58cff 70%, #6ab7ff);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .overlay .sub { margin-top: 10px; font-size: clamp(14px, 2.4vw, 17px); opacity: .8; max-width: 520px; line-height: 1.55; }
  .overlay .chainRow { display: flex; align-items: center; gap: 6px; margin-top: 26px; flex-wrap: wrap; justify-content: center; }
  .overlay .chainRow .dot { border-radius: 50%; box-shadow: inset -3px -4px 7px rgba(0,0,20,.5); }
  .overlay .chainRow .arrow { opacity: .4; font-size: 12px; }
  .overlay button { margin-top: 32px; font-size: 19px; font-weight: 700; letter-spacing: 2px; padding: 14px 52px;
    border-radius: 999px; border: none; cursor: pointer; color: #101430;
    background: linear-gradient(120deg, #ffd76a, #ff9a5a); box-shadow: 0 6px 30px rgba(255,170,80,.45);
    transition: transform .12s; }
  .overlay button:hover { transform: scale(1.05); }
  #finalScore { font-size: 58px; font-weight: 900; margin-top: 8px; }
  #finalBest { font-size: 15px; opacity: .7; margin-top: 4px; }
  #newBestTag { display: none; margin-top: 10px; font-size: 14px; font-weight: 700; color: #ffd76a; letter-spacing: 2px; }

  .popup { position: fixed; z-index: 15; font-weight: 800; pointer-events: none; transform: translate(-50%, -50%);
    text-shadow: 0 2px 10px rgba(0,0,0,.6); animation: rise 1s ease-out forwards; }
  @keyframes rise { 0% { opacity: 0; margin-top: 6px; } 15% { opacity: 1; } 100% { opacity: 0; margin-top: -46px; } }

  #vignette { position: fixed; inset: 0; z-index: 5; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(3,4,12,.55) 100%); }
  #dangerFlash { position: fixed; inset: 0; z-index: 6; pointer-events: none; opacity: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(255,40,40,.35) 100%); transition: opacity .3s; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="vignette"></div>
<div id="dangerFlash"></div>

<div class="hud" id="scoreBox">
  <div class="label">SCORE</div>
  <div id="score">0</div>
  <div id="best">BEST 0</div>
</div>

<div class="hud" id="nextBox">
  <div class="label">NEXT</div>
  <div id="nextBall"></div>
  <div id="nextName"></div>
</div>

<div class="hud" id="chain"></div>
<div class="hud" id="hint">click / tap to drop &nbsp;•&nbsp; drag to orbit &nbsp;•&nbsp; scroll to zoom</div>
<button id="soundBtn" title="toggle sound">🔊</button>

<div class="overlay" id="startOverlay">
  <h1>🪐 COSMIC JAR</h1>
  <div class="sub">Drop planets into the jar. Two of the same kind <b>merge into the next one</b>.
    Climb the chain from tiny Pluto all the way to the <b>Sun</b> — but don't overflow the jar!</div>
  <div class="chainRow" id="startChain"></div>
  <button id="playBtn">PLAY</button>
</div>

<div class="overlay hidden" id="overOverlay">
  <h1>JAR OVERFLOW</h1>
  <div id="finalScore">0</div>
  <div id="finalBest"></div>
  <div id="newBestTag">★ NEW BEST ★</div>
  <button id="againBtn">PLAY AGAIN</button>
</div>

<script type="importmap">
{ "imports": { "three": "./lib/three.module.min.js", "cannon-es": "./lib/cannon-es.js" } }
</script>
<script type="module" src="./main.js"></script>
</body>
</html>
